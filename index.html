<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Precision Note & FFT Interface</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
            margin: 20px;
        }
        #container { max-width: 650px; }
        h1 {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            border-bottom: 2px solid #000000;
            padding-bottom: 5px;
        }
        button {
            font-family: 'Courier New', monospace;
            background: #ffffff;
            border: 2px solid #000000;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover { background: #f0f0f0; }
        .data-label { font-size: 1rem; font-weight: bold; margin: 15px 0 5px 0; }
        #note-display {
            font-size: 1.5rem;
            background: #f0f0f0;
            border: 1px solid #000000;
            padding: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            box-sizing: border-box;
        }
        canvas { background: #ffffff; border: 1px solid #000000; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="container">
    <h1>PUBLIC AUDIO INTERFACE</h1>
    
    <button id="start-btn">START AUDIO CAPTURE</button>
    
    <div class="data-label">CURRENT DETECTED NOTES:</div>
    <div id="note-display">AWAITING USER START...</div>
    
    <div class="data-label">WAVEFORM AMPLITUDE:</div>
    <canvas id="waveCanvas" width="640" height="130"></canvas>
    
    <div class="data-label">FREQUENCY SPECTRUM:</div>
    <canvas id="fftCanvas" width="640" height="130"></canvas>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const noteDisplay = document.getElementById('note-display');
    const waveCanvas = document.getElementById('waveCanvas');
    const waveCtx = waveCanvas.getContext('2d');
    const fftCanvas = document.getElementById('fftCanvas');
    const fftCtx = fftCanvas.getContext('2d');

    const OFFSET_LEFT = 45;
    const OFFSET_RIGHT = 15;
    const PLOT_WIDTH = waveCanvas.width - OFFSET_LEFT - OFFSET_RIGHT;

    const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    
    // Explicit array constructors to bypass markdown renderer bugs completely
    const freqMarks = Array(0, 250, 500, 750, 1000, 1250, 1500);
    const magMarks = Array(0, 10, 20, 30);

    let audioCtx, analyser, dataArray, bufferLength;

    startBtn.addEventListener('click', async () => {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
            noteDisplay.innerText = "[ERROR: INSECURE CONTEXT. Use localhost or HTTPS]";
            alert("Web Audio capture requires an HTTPS production server or Localhost context to run.");
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ 
                video: true, 
                audio: {
                    echoCancellation: false,
                    noiseSuppression: false,
                    autoGainControl: false
                } 
            });
            
            if (stream.getAudioTracks().length === 0) {
                noteDisplay.innerText = "[ERROR: AUDIO TRACK NOT FOUND]";
                alert("You must check the 'Share audio' box in the sharing prompt!");
                stream.getTracks().forEach(track => track.stop());
                return;
            }

            startBtn.style.display = 'none';
            noteDisplay.innerText = "LISTENING...";

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            
            analyser = audioCtx.createAnalyser();
            // Using maximum browser FFT resolution size (4096) for high-accuracy frequency bins
            analyser.fftSize = 4096; 
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Float32Array(bufferLength);
            
            source.connect(analyser);
            drawLoop();
        } catch (err) {
            noteDisplay.innerText = "[ERROR: MIC ACCESS DENIED]";
            console.error(err);
        }
    });

    function hzToNoteString(frequency) {
        if (frequency <= 0 || isNaN(frequency)) return null;
        const midiNote = 12 * Math.log2(frequency / 440.0) + 69;
        const roundedMidi = Math.round(midiNote);
        const noteName = NOTE_NAMES[roundedMidi % 12];
        const octave = Math.floor(roundedMidi / 12) - 1;
        return `${noteName}${octave}`;
    }

    function drawLoop() {
        requestAnimationFrame(drawLoop);

        const waveData = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(waveData);
        analyser.getFloatFrequencyData(dataArray);

        // 1. Draw Waveform Axis Grid Lines
        waveCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
        waveCtx.strokeStyle = "#e0e0e0";
        waveCtx.fillStyle = "#000000";
        waveCtx.font = "10px Courier New";
        
        const yMarks = Array(0.5, 0.0, -0.5);
        yMarks.forEach(val => {
            let yPos = ((-val + 0.5) * (waveCanvas.height - 20)) + 10;
            waveCtx.beginPath(); waveCtx.moveTo(OFFSET_LEFT, yPos); waveCtx.lineTo(waveCanvas.width - OFFSET_RIGHT, yPos); waveCtx.stroke();
            waveCtx.fillText(val.toFixed(1), 5, yPos + 4);
        });

        // Plot Waveform Timeline Trace
        waveCtx.beginPath();
        waveCtx.lineWidth = 1.5;
        waveCtx.strokeStyle = '#0000ff';
        
        let sliceWidth = PLOT_WIDTH / waveData.length;
        let x = OFFSET_LEFT;
        for (let i = 0; i < waveData.length; i++) {
            let y = (waveData[i] * (waveCanvas.height - 20) / 2) + ((waveCanvas.height - 20) / 2) + 10;
            if (i === 0) waveCtx.moveTo(x, y); else waveCtx.lineTo(x, y);
            x += sliceWidth;
        }
        waveCtx.stroke();

        // 2. Draw FFT Calibration Marks
        fftCtx.clearRect(0, 0, fftCanvas.width, fftCanvas.height);
        fftCtx.strokeStyle = "#e0e0e0";
        fftCtx.fillStyle = "#000000";
        
        freqMarks.forEach(freq => {
            let xPos = OFFSET_LEFT + ((freq / 1500) * PLOT_WIDTH);
            fftCtx.beginPath(); fftCtx.moveTo(xPos, 5); fftCtx.lineTo(xPos, fftCanvas.height - 20); fftCtx.stroke();
            fftCtx.fillText(freq + "Hz", xPos - 15, fftCanvas.height - 5);
        });

        magMarks.forEach(mag => {
            let yPos = (fftCanvas.height - 20) - ((mag / 30) * (fftCanvas.height - 25));
            fftCtx.fillText(mag, 15, yPos + 4);
        });

        const sampleRate = audioCtx.sampleRate;
        const hzPerBin = sampleRate / analyser.fftSize;
        let barWidth = (PLOT_WIDTH / 80);
        fftCtx.fillStyle = '#ff0000';

        let detectedNotes = Array();

        // 3. FFT Peak Detection and Quadratic Interpolation Engine
        for (let i = 1; i < bufferLength - 1; i++) {
            const freq = i * hzPerBin;
            if (freq > 1500) break;

            // Convert browser Decibels (-140 to 0) into positive magnitude metric
            let db = dataArray[i];
            let magnitude = Math.max(0, db + 100); 

            // Render spectrum bar element
            let xPos = OFFSET_LEFT + ((freq / 1500) * PLOT_WIDTH);
            let barHeight = (magnitude / 100) * (fftCanvas.height - 25);
            fftCtx.fillRect(xPos, (fftCanvas.height - 20) - barHeight, Math.max(1, barWidth - 1), barHeight);

            // Is this point a strict local peak compared to its immediate neighbors?
            let prevMag = Math.max(0, dataArray[i - 1] + 100);
            let nextMag = Math.max(0, dataArray[i + 1] + 100);

            if (magnitude > 35 && magnitude > prevMag && magnitude > nextMag && freq >= 60 && freq <= 1200) {
                // --- ACCURACY UPGRADE: Quadratic Interpolation Math ---
                // Interpolates between discrete FFT bins to identify exact resonance peaks
                let alpha = prevMag;
                let beta = magnitude;
                let gamma = nextMag;
                
                let p = 0.5 * (alpha - gamma) / (alpha - 2 * beta + gamma);
                let preciseBin = i + p;
                let exactFrequency = preciseBin * hzPerBin;

                let noteStr = hzToNoteString(exactFrequency);
                if (noteStr && !detectedNotes.includes(noteStr)) {
                    detectedNotes.push(noteStr);
                }
            }
        }

        // 4. Update note interface layout stream
        if (detectedNotes.length > 0) {
            noteDisplay.innerText = "Notes: " + detectedNotes.join(", ");
        } else {
            noteDisplay.innerText = "Silence";
        }
    }
</script>

</body>
</html>
