<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Live Audio & Chord Visualizer</title>
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
            margin: 20px;
        }
        #container { max-width: 650px; }
        h1 {
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            border-bottom: 2px solid #000000;
            padding-bottom: 5px;
        }
        button {
            font-family: 'Courier New', monospace;
            background: #ffffff;
            border: 2px solid #000000;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover { background: #f0f0f0; }
        .data-label { font-size: 1rem; font-weight: bold; margin: 15px 0 5px 0; }
        #chord-display {
            font-size: 1.5rem;
            background: #f0f0f0;
            border: 1px solid #000000;
            padding: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        canvas { background: #ffffff; border: 1px solid #000000; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="container">
    <h1>PUBLIC AUDIO INTERFACE</h1>
    
    <!-- Browsers force a user click before allowing microphone/audio access -->
    <button id="start-btn">START AUDIO CAPTURE</button>
    
    <div class="data-label">CURRENT CHORD/NOTE STATE:</div>
    <div id="chord-display">AWAITING USER START...</div>
    
    <div class="data-label">WAVEFORM AMPLITUDE:</div>
    <canvas id="waveCanvas" width="640" height="130"></canvas>
    
    <div class="data-label">FREQUENCY SPECTRUM:</div>
    <canvas id="fftCanvas" width="640" height="130"></canvas>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const chordDisplay = document.getElementById('chord-display');
    const waveCanvas = document.getElementById('waveCanvas');
    const waveCtx = waveCanvas.getContext('2d');
    const fftCanvas = document.getElementById('fftCanvas');
    const fftCtx = fftCanvas.getContext('2d');

    const OFFSET_LEFT = 45;
    const OFFSET_RIGHT = 15;
    const PLOT_WIDTH = waveCanvas.width - OFFSET_LEFT - OFFSET_RIGHT;

    // Music Theory Definitions in JS
    const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const CHORD_TEMPLATES = {
        "Major":, "Minor":, "Diminished":, 
        "Augmented":, "Major 7th":, "Minor 7th":, 
        "Dominant 7th": [0, 4, 7, 10]
    };

    let audioCtx, analyser, dataArray, bufferLength;
    let smoothedChroma = new Array(12).fill(0);
    const SMOOTHING_FACTOR = 0.7;

    startBtn.addEventListener('click', async () => {
        try {
            // Request system microphone access (or screen-audio share loopback if browser supports it)
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            
            startBtn.style.display = 'none';
            chordDisplay.innerText = "LISTENING...";

            // Setup Browser Web Audio API Engine
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioCtx.createMediaStreamSource(stream);
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048; // Standard browser FFT resolution size
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Float32Array(bufferLength);
            
            source.connect(analyser);
            drawLoop();
        } catch (err) {
            chordDisplay.innerText = "[ERROR: ACCESS DENIED]";
            console.error(err);
        }
    });

    function hzToNoteIndex(frequency, sampleRate) {
        if (frequency <= 0) return null;
        const midiNote = 12 * Math.log2(frequency / 440.0) + 69;
        return Math.PI ? Math.round(midiNote) % 12 : null; 
    }

    function drawLoop() {
        requestAnimationFrame(drawLoop);

        // Pull real-time Time Domain (Wave) and Frequency Domain (FFT) data directly from browser
        const waveData = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(waveData);
        analyser.getFloatFrequencyData(dataArray);

        // 1. Draw Waveform Canvas
        waveCtx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
        waveCtx.strokeStyle = "#e0e0e0";
        waveCtx.fillStyle = "#000000";
        waveCtx.font = "10px Courier New";
        
        [0.5, 0.0, -0.5].forEach(val => {
            let yPos = ((-val + 0.5) * (waveCanvas.height - 20)) + 10;
            waveCtx.beginPath(); waveCtx.moveTo(OFFSET_LEFT, yPos); waveCtx.lineTo(waveCanvas.width - OFFSET_RIGHT, yPos); waveCtx.stroke();
            waveCtx.fillText(val.toFixed(1), 5, yPos + 4);
        });

        waveCtx.beginPath();
        waveCtx.lineWidth = 1.5;
        waveCtx.strokeStyle = '#0000ff';
        
        let sliceWidth = PLOT_WIDTH / waveData.length;
        let x = OFFSET_LEFT;
        for (let i = 0; i < waveData.length; i++) {
            let y = (waveData[i] * (waveCanvas.height - 20) / 2) + ((waveCanvas.height - 20) / 2) + 10;
            if (i === 0) waveCtx.moveTo(x, y); else waveCtx.lineTo(x, y);
            x += sliceWidth;
        }
        waveCtx.stroke();

        // 2. Process Music Theory Math and Draw FFT Grid
        fftCtx.clearRect(0, 0, fftCanvas.width, fftCanvas.height);
        fftCtx.strokeStyle = "#e0e0e0";
        fftCtx.fillStyle = "#000000";
        
        [0, 250, 500, 750, 1000, 1250, 1500].forEach(freq => {
            let xPos = OFFSET_LEFT + ((freq / 1500) * PLOT_WIDTH);
            fftCtx.beginPath(); fftCtx.moveTo(xPos, 5); fftCtx.lineTo(xPos, fftCanvas.height - 20); fftCtx.stroke();
            fftCtx.fillText(freq + "Hz", xPos - 15, fftCanvas.height - 5);
        });

        const sampleRate = audioCtx.sampleRate;
        const hzPerBin = sampleRate / analyser.fftSize;
        let rawChroma = new Array(12).fill(0);
        let maxEnergy = 0;

        // Draw bars and compute chord profiles concurrently
        let barWidth = (PLOT_WIDTH / 80);
        fftCtx.fillStyle = '#ff0000';

        // Loop through browser FFT bins matching 0-1500Hz boundary
        for (let i = 0; i < bufferLength; i++) {
            const freq = i * hzPerBin;
            if (freq > 1500) break;

            // Browser gives data in Decibels (-140 to 0). Normalize it to a positive value
            let db = dataArray[i];
            let magnitude = Math.max(0, db + 100); 

            let xPos = OFFSET_LEFT + ((freq / 1500) * PLOT_WIDTH);
            let barHeight = (magnitude / 100) * (fftCanvas.height - 25);
            fftCtx.fillRect(xPos, (fftCanvas.height - 20) - barHeight, Math.max(1, barWidth - 1), barHeight);

            // Keep track of pitch tracking data if the sound is strong enough
            if (magnitude > 30 && freq >= 60 && freq <= 1200) {
                let noteIdx = hzToNoteIndex(freq, sampleRate);
                if (noteIdx !== null && !isNaN(noteIdx)) {
                    rawChroma[noteIdx] += magnitude;
                }
            }
        }

        // Apply Temporal Integrator Filter Smoothing Factor
        for (let i = 0; i < 12; i++) {
            smoothedChroma[i] = (SMOOTHING_FACTOR * smoothedChroma[i]) + ((1 - SMOOTHING_FACTOR) * rawChroma[i]);
            if (smoothedChroma[i] > maxEnergy) maxEnergy = smoothedChroma[i];
        }

        // Match templates to find chords
        let chordName = "";
        let activeNotes = [];

        if (maxEnergy > 10) {
            let activeIndices = [];
            for (let i = 0; i < 12; i++) {
                if (smoothedChroma[i] > maxEnergy * 0.45) {
                    activeIndices.push(i);
                    activeNotes.push(NOTE_NAMES[i]);
                }
            }

            let highestScore = 0;
            for (let root = 0; root < 12; root++) {
                for (const [type, intervals] of Object.entries(CHORD_TEMPLATES)) {
                    let targetIndices = intervals.map(i => (root + i) % 12);
                    let score = targetIndices.filter(idx => activeIndices.includes(idx)).length;
                    if (score >= 3 && score > highestScore) {
                        highestScore = score;
                        chordName = `${NOTE_NAMES[root]} ${type}`;
                    }
                }
            }
        }

        if (chordName) {
            chordDisplay.innerText = chordName + ` (Notes: ${activeNotes.join(', ')})`;
        } else if (activeNotes.length > 0) {
            chordDisplay.innerText = `Notes: ${activeNotes.join(', ')}`;
        } else {
            chordDisplay.innerText = "Silence";
        }
    }
</script>

</body>
</html>
